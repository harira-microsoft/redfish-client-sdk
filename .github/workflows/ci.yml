name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  python:
  # --------------------------------------------------------------------------
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install SDK + dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check redfish_sdk/ || true   # warn-only until ruff config is tuned

      - name: Type-check (mypy)
        run: mypy redfish_sdk/ --ignore-missing-imports || true

      - name: Unit tests
        run: pytest tests/ -v --tb=short

  # --------------------------------------------------------------------------
  cpp:
  # --------------------------------------------------------------------------
    name: C++ SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libcurl4-openssl-dev libssl-dev \
            nlohmann-json3-dev

      - name: Configure
        run: cmake -B cpp/build -S cpp -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cpp/build --parallel $(nproc)

  # --------------------------------------------------------------------------
  rust:
  # --------------------------------------------------------------------------
    name: Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all

      - name: Test (65 unit + 3 doc tests)
        run: cargo test --all
